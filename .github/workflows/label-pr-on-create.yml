name: "Label Pull Request"
on:
- pull_request_target

jobs:
  label:
    permissions:
      pull-requests: write
      contents: read 
    runs-on: ubuntu-latest

    steps:
    - name: Set basic labels
      uses: actions/labeler@v5
      with:
        sync-labels: true

  pr-size:
    needs: label
    permissions:
      pull-requests: write
      contents: read
    runs-on: ubuntu-latest

    steps:
    - name: Set size labels
      uses: vkirilichev/changed-lines-count-labeler@v0.2
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        configuration-path: .github/pr-size-labeler.yml
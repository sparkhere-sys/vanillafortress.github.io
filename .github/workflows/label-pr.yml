name: "Label Pull Request on create"
on:
  pull_request_target:
    types: [opened]

jobs:
  apply-pending-review:
    permissions:
      pull-requests: write
    runs-on: ubuntu-latest

    steps:
    - name: Apply pending review labels
      uses: actions-ecosystem/action-add-labels@v1
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        labels: "status: pending review"
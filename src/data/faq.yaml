- question: What was Quickplay?
  answer: |
    Quickplay was TF2's old matchmaking system. You could press "Play" and immediately you're in a match. 
    This was removed by Valve in the Meet Your Match update in favor of Casual Mode.

- question: Why are you doing this?
  answer: |
    Our mission is to help bring back Quickplay by organizing sessions on TF2 servers 
    that run the Quickplay ruleset.

- question: How will this help bring back Quickplay?
  answer: |
    By giving people a place where they can experience Quickplay's ruleset for themselves, 
    eventually more people will prefer it over Casual Mode and support bringing it back.

- question: What should I do if the servers are all dead?
  answer: |
    You can sacrifice 10 minutes of playtime to stay on it. People will join servers 
    if they see there's 1-3 players on, eventually filling it up. You can also start a session for it 
    on our
  link:
    label: Discord server
    social: discord

- question: How can I help?
  answer: | 
    Spread the word. We want more and more people to fill up community servers, 
    and it's up to YOU to do it.
